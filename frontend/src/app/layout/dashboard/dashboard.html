<div class="flex h-screen bg-surface-50">
  <!-- ===== Sidebar ===== -->
  <aside class="flex w-64 flex-col border-r border-surface-200 bg-white">
    <!-- Logo / nombre de la app -->
    <div class="flex items-center gap-3 border-b border-surface-200 px-6 py-5">
      <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary-600 text-white">
        <i class="pi pi-wallet text-lg"></i>
      </span>
      <div class="leading-tight">
        <h1 class="text-lg font-bold text-surface-800">LemAPP</h1>
        <p class="text-xs font-semibold uppercase tracking-wider text-primary-600">Contable</p>
      </div>
    </div>

    <!-- Menú de navegación -->
    <nav class="flex flex-1 flex-col gap-1 p-4">
      <a
        routerLink="/dashboard"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-surface-600 transition-colors hover:bg-surface-100"
      >
        <i class="pi pi-home w-5 text-center"></i>
        <span>Inicio</span>
      </a>
      <a
        routerLink="/dashboard/companies"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-surface-600 transition-colors hover:bg-surface-100"
      >
        <i class="pi pi-building w-5 text-center"></i>
        <span>Empresas</span>
      </a>
      <a
        routerLink="/dashboard/tasks"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-surface-600 transition-colors hover:bg-surface-100"
      >
        <i class="pi pi-check-square w-5 text-center"></i>
        <span>Tareas</span>
      </a>
      <a
        routerLink="/dashboard/invoices"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-surface-600 transition-colors hover:bg-surface-100"
      >
        <i class="pi pi-file w-5 text-center"></i>
        <span>Facturación</span>
      </a>
    </nav>

    <!-- Footer: usuario + cerrar sesión -->
    <div class="border-t border-surface-200 p-4">
      @if (user(); as u) {
        <div class="mb-3 flex items-center gap-3">
          <span class="flex h-9 w-9 items-center justify-center rounded-full bg-surface-200 text-sm font-semibold text-surface-700">
            {{ u.fullName.charAt(0) }}
          </span>
          <div class="min-w-0 leading-tight">
            <p class="truncate text-sm font-medium text-surface-800">{{ u.fullName }}</p>
            <p class="truncate text-xs capitalize text-surface-500">{{ u.role }}</p>
          </div>
        </div>
      }
      <p-button
        label="Cerrar sesión"
        icon="pi pi-sign-out"
        severity="secondary"
        [text]="true"
        styleClass="w-full justify-start"
        (onClick)="logout()"
      />
    </div>
  </aside>

  <!-- ===== Área principal ===== -->
  <main class="flex-1 overflow-y-auto p-8">
    <router-outlet />
  </main>
</div>
